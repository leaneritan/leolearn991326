<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar 1 - Interactive Textbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2f7f7b',
                        background: '#f6f8f7',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        comic: ['Comic Neue', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f6f8f7; color: #1e293b; }
        .font-black { font-weight: 900; }
        .font-bold { font-weight: 700; }
        .font-medium { font-weight: 500; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            color: #2f7f7b;
        }
        .icon-box {
            background-color: rgba(47, 127, 123, 0.1);
            @apply rounded-lg p-2 flex items-center justify-center;
        }
        .card {
            @apply bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow overflow-hidden;
        }
        .lesson-badge {
            @apply inline-flex items-center px-3 py-1 rounded-full text-primary text-xs font-bold mb-4 uppercase tracking-wider;
            background-color: rgba(47, 127, 123, 0.1);
        }
        #laser-pointer {
            position: fixed;
            width: 12px;
            height: 12px;
            background: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 10px 4px rgba(255, 0, 0, 0.4);
            display: none;
            transform: translate(-50%, -50%);
        }
        body.laser-active { cursor: crosshair; }
        body.laser-active #laser-pointer { display: block; }

        .grammar-page-container {
            container-type: size;
            background-color: white;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            border-radius: 0.5rem;
        }
        .nav-item.active {
            background-color: rgba(47, 127, 123, 0.1);
            @apply text-primary border-r-4 border-primary font-bold;
        }
        .progress-bar-inner {
            @apply bg-primary h-full rounded-full transition-all duration-700 ease-out;
        }
        .input-blank {
            @apply border-b-2 border-dashed border-primary outline-none px-1 text-center font-bold text-primary transition-all rounded-sm;
            background-color: rgba(47, 127, 123, 0.05);
            min-width: 50px;
        }
        .input-blank:focus { @apply bg-white border-primary shadow-sm; }
        .input-correct { @apply border-green-500 bg-green-50 text-green-700 !important; }
        .input-incorrect { @apply border-red-500 bg-red-50 text-red-700 !important; }

        .drop-zone {
            @apply border-2 border-dashed border-slate-200 rounded-xl p-4 min-h-[100px] flex flex-wrap gap-2 transition-colors bg-slate-50/50;
        }
        .drop-zone.drag-over { border-color: #2f7f7b; background-color: rgba(47, 127, 123, 0.1); }
        .draggable-item {
            @apply bg-white border border-slate-200 p-2 px-4 rounded-lg shadow-sm cursor-grab active:cursor-grabbing hover:border-primary transition-all select-none font-medium text-sm;
        }

        .word-card {
            @apply flex flex-col items-center justify-center p-4 bg-white border border-slate-200 rounded-xl transition-all hover:shadow-md hover:border-primary cursor-default;
        }

        .quiz-option {
            @apply w-full p-4 rounded-xl border border-slate-200 text-left font-medium text-slate-600 hover:border-primary hover:bg-teal-50 transition-all flex items-center gap-4 group;
        }
        .quiz-option.selected {
            border-color: #2f7f7b;
            background-color: rgba(47, 127, 123, 0.1);
            @apply text-primary font-bold;
        }
        .quiz-radio {
            @apply w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center flex-shrink-0 group-hover:border-primary transition-colors;
        }
        .quiz-option.selected .quiz-radio { border-color: #2f7f7b; }
        .quiz-radio-inner {
            @apply w-2.5 h-2.5 rounded-full bg-primary scale-0 transition-transform;
        }
        .quiz-option.selected .quiz-radio-inner { @apply scale-100; }

        .key-takeaways-box {
            background-color: rgba(47, 127, 123, 0.05);
            @apply rounded-2xl border border-primary/20 p-8 mb-12;
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-background text-slate-900 flex h-screen overflow-hidden">
    <div id="laser-pointer"></div>

    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col flex-shrink-0 z-40">
        <div class="p-6 border-b border-slate-100 flex items-center gap-3">
            <div class="icon-box w-10 h-10">
                <span class="material-symbols-outlined text-2xl">school</span>
            </div>
            <div>
                <h1 class="font-black text-xl tracking-tight leading-none text-primary">Grammar 1</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Interactive Textbook</p>
            </div>
        </div>

        <div id="sidebar-nav" class="flex-1 overflow-y-auto py-4">
            <!-- Navigation items injected here -->
        </div>

        <div class="p-6 bg-white border-t border-slate-100">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">military_tech</span>
                    <span id="xp-display" class="font-black text-xl text-primary">0 XP</span>
                </div>
                <div id="trophy-count" class="flex items-center gap-1 text-yellow-500 font-bold">
                    <span class="material-symbols-outlined">emoji_events</span>
                    <span class="text-lg">0</span>
                </div>
            </div>
            <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                <div id="overall-progress-bar" class="progress-bar-inner" style="width: 0%"></div>
            </div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2 text-center">Course Progress</p>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-16 bg-white/80 backdrop-blur border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-30">
            <nav id="breadcrumb" class="flex items-center text-sm font-medium text-slate-400 gap-2">
                <!-- Breadcrumbs -->
            </nav>

            <div class="flex items-center gap-4">
                <button id="laser-toggle" class="p-2 rounded-lg hover:bg-slate-100 transition-colors" title="Toggle Laser Pointer">
                    <span class="material-symbols-outlined">highlight</span>
                </button>
                <div class="h-6 w-px bg-slate-200"></div>
                <button id="view-toggle" class="flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-200 font-bold text-sm hover:bg-slate-50 transition-all">
                    <span id="view-toggle-icon" class="material-symbols-outlined">menu_book</span>
                    <span id="view-toggle-text">Book View</span>
                </button>
                <div class="h-6 w-px bg-slate-200"></div>
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-xs font-black leading-none text-slate-900">Leo</p>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Student</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-black overflow-hidden border-2 border-white shadow-sm">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Leo" alt="Avatar">
                    </div>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto">
            <!-- Lesson View -->
            <div id="lesson-view" class="max-w-4xl mx-auto py-12 px-8">
                <!-- Lesson content -->
            </div>

            <!-- Book View -->
            <div id="book-view" class="hidden h-full flex flex-col items-center p-8">
                <div class="flex items-center bg-white border border-slate-200 rounded-xl p-1 shadow-sm mb-8">
                    <button id="prev-page" class="p-2 rounded-lg hover:bg-slate-50 transition-all text-slate-600 active:scale-90">
                        <span class="material-symbols-outlined font-bold">chevron_left</span>
                    </button>
                    <div class="px-6 font-bold text-slate-700 min-w-[140px] text-center select-none text-sm uppercase tracking-widest">
                        <span id="page-info">Page 1 / 159</span>
                    </div>
                    <button id="next-page" class="p-2 rounded-lg hover:bg-slate-50 transition-all text-slate-600 active:scale-90">
                        <span class="material-symbols-outlined font-bold">chevron_right</span>
                    </button>
                </div>
                <div class="grammar-page-container border border-slate-200 rounded-lg" id="book-page-content">
                    <!-- PDF content -->
                </div>
            </div>
        </main>
    </div>

    <!-- Celebration Modal -->
    <div id="celebration-modal" class="fixed inset-0 bg-primary/20 backdrop-blur-md z-[60] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-12 text-center max-w-md shadow-2xl scale-0 transition-transform duration-500" id="celebration-card">
            <div class="icon-box w-20 h-20 mx-auto mb-6 rounded-2xl">
                <span class="material-symbols-outlined text-5xl">emoji_events</span>
            </div>
            <h2 class="text-4xl font-black mb-2 tracking-tight">GOAL!!!</h2>
            <p class="text-slate-600 font-medium mb-8">You finished the lesson and earned <span id="earned-xp" class="text-primary font-bold">0</span> XP!</p>
            <button id="finish-lesson-btn" class="w-full bg-primary text-white py-4 rounded-2xl font-black text-xl shadow-xl shadow-teal-900/20 hover:-translate-y-1 transition-all uppercase">Continue Match</button>
        </div>
    </div>

    <script>
        let lessonsData = null;
        let bookData = null;
        let tocData = null;
        let currentView = 'lesson';
        let currentLessonId = '1.1';
        let currentPageNum = 1;
        let xp = 0;
        let completedLessons = [];
        let laserActive = false;
        let quizUserAnswers = {};

        async function init() {
            try {
                const [lessonsRes, bookRes, tocRes] = await Promise.all([
                    fetch('lessons.json'),
                    fetch('book_data.json'),
                    fetch('toc.json')
                ]);
                lessonsData = await lessonsRes.json();
                bookData = await bookRes.json();
                tocData = await tocRes.json();

                loadState();
                renderSidebar();
                renderView();
                updateXPDisplay();

                document.getElementById('view-toggle').onclick = toggleView;
                document.getElementById('laser-toggle').onclick = toggleLaser;
                document.getElementById('prev-page').onclick = () => changePage(currentPageNum - 1);
                document.getElementById('next-page').onclick = () => changePage(currentPageNum + 1);
                document.getElementById('finish-lesson-btn').onclick = closeCelebration;

                document.addEventListener('mousemove', (e) => {
                    if (laserActive) {
                        const lp = document.getElementById('laser-pointer');
                        lp.style.left = e.clientX + 'px';
                        lp.style.top = e.clientY + 'px';
                    }
                });
            } catch (err) { console.error("Init failed:", err); }
        }

        function loadState() {
            const saved = localStorage.getItem('grammar_v4_state');
            if (saved) {
                const state = JSON.parse(saved);
                xp = state.xp || 0;
                completedLessons = state.completedLessons || [];
                currentLessonId = state.currentLessonId || '1.1';
                currentPageNum = state.currentPageNum || 1;
            }
        }
        function saveState() { localStorage.setItem('grammar_v4_state', JSON.stringify({ xp, completedLessons, currentLessonId, currentPageNum })); }

        function toggleView() {
            currentView = currentView === 'lesson' ? 'book' : 'lesson';
            const btnText = document.getElementById('view-toggle-text');
            const btnIcon = document.getElementById('view-toggle-icon');
            renderSidebar();
            if (currentView === 'book') {
                btnText.textContent = 'Lesson View'; btnIcon.textContent = 'school';
                document.getElementById('lesson-view').classList.add('hidden');
                document.getElementById('book-view').classList.remove('hidden');
                renderBookPage(currentPageNum);
            } else {
                btnText.textContent = 'Book View'; btnIcon.textContent = 'menu_book';
                document.getElementById('lesson-view').classList.remove('hidden');
                document.getElementById('book-view').classList.add('hidden');
                renderLesson(currentLessonId);
            }
        }

        function toggleLaser() {
            laserActive = !laserActive;
            document.body.classList.toggle('laser-active', laserActive);
            document.getElementById('laser-toggle').classList.toggle('bg-teal-50', laserActive);
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = '';

            if (currentView === 'lesson') {
                lessonsData.chapters.forEach(chapter => {
                    const div = document.createElement('div');
                    div.className = 'mb-6';
                    div.innerHTML = `
                        <h3 class="px-6 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Chapter ${chapter.id}: ${chapter.title}</h3>
                        <div class="space-y-1">
                            ${chapter.lessons.map(l => `
                                <button onclick="renderLesson('${l.id}')" id="nav-${l.id}" class="nav-item w-full flex items-center justify-between px-6 py-3 text-sm transition-all hover:bg-slate-50 group">
                                    <div class="flex items-center gap-3">
                                        <span class="material-symbols-outlined text-lg opacity-60">${l.icon}</span>
                                        <span class="font-medium text-slate-600 group-hover:text-primary transition-colors">${l.title}</span>
                                    </div>
                                    ${completedLessons.includes(l.id) ? '<span class="material-symbols-outlined text-yellow-500 text-lg">emoji_events</span>' : '<span class="material-symbols-outlined text-slate-300 text-lg">chevron_right</span>'}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    nav.appendChild(div);
                });
            } else {
                tocData.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'mb-1';
                    div.innerHTML = `
                        <button onclick="renderBookPage(${item.page})" class="nav-item w-full flex items-center justify-between px-6 py-2 text-xs transition-all hover:bg-slate-50 group">
                            <span class="font-bold text-slate-600 group-hover:text-primary truncate mr-2">${item.title}</span>
                            <span class="text-[10px] text-slate-300">${item.page}</span>
                        </button>
                    `;
                    nav.appendChild(div);
                    if (item.subsections) {
                        item.subsections.forEach(sub => {
                            const sdiv = document.createElement('div');
                            sdiv.className = 'mb-1 pl-4';
                            sdiv.innerHTML = `
                                <button onclick="renderBookPage(${sub.page})" class="nav-item w-full flex items-center justify-between px-6 py-1 text-[10px] transition-all hover:bg-slate-50 group">
                                    <span class="text-slate-500 group-hover:text-primary truncate mr-2">${sub.title}</span>
                                    <span class="text-[8px] text-slate-300">${sub.page}</span>
                                </button>
                            `;
                            nav.appendChild(sdiv);
                        });
                    }
                });
            }
        }

        function renderView() { if (currentView === 'lesson') renderLesson(currentLessonId); else renderBookPage(currentPageNum); }

        function renderLesson(id) {
            currentLessonId = id; quizUserAnswers = {}; saveState();
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${id}`); if (activeNav) activeNav.classList.add('active');

            let lesson = null; let chapter = null;
            lessonsData.chapters.some(ch => { lesson = ch.lessons.find(l => l.id === id); if (lesson) { chapter = ch; return true; } return false; });
            if (!lesson) return;

            document.getElementById('breadcrumb').innerHTML = `
                <span class="uppercase tracking-widest text-[10px] font-black text-slate-400">Chapter ${chapter.id}</span>
                <span class="material-symbols-outlined text-xs">chevron_right</span>
                <span class="text-slate-900 font-black text-[10px] uppercase tracking-widest">${lesson.title}</span>
            `;

            const view = document.getElementById('lesson-view');
            view.innerHTML = `
                <div class="lesson-badge">${lesson.badge}</div>
                <h2 class="text-5xl font-black tracking-tight mb-4 flex items-center gap-4 text-slate-900 leading-tight">
                    <div class="icon-box w-16 h-16 rounded-2xl"><span class="material-symbols-outlined text-4xl">${lesson.icon}</span></div>
                    ${lesson.title}
                </h2>
                <p class="text-xl text-slate-500 font-medium leading-relaxed mb-12">${lesson.content}</p>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    ${lesson.examples ? lesson.examples.map(ex => `
                        <div class="card p-6 flex flex-col items-center text-center group">
                            <div class="icon-box w-16 h-16 rounded-2xl mb-4 group-hover:scale-110 transition-transform">
                                <span class="material-symbols-outlined text-3xl">${ex.icon}</span>
                            </div>
                            <h4 class="font-black text-slate-900 mb-1 leading-tight">${ex.title}</h4>
                            <p class="text-sm font-bold text-slate-400 uppercase tracking-tighter">${ex.subtitle}</p>
                        </div>
                    `).join('') : ''}
                </div>

                <div class="key-takeaways-box">
                    <h3 class="font-black text-xl mb-6 flex items-center gap-3 text-primary">
                        <span class="material-symbols-outlined">verified</span>
                        Key Takeaways
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${lesson.keyTakeaways.map(p => `
                            <div class="flex items-start gap-3">
                                <span class="material-symbols-outlined text-primary">check_circle</span>
                                <p class="font-bold text-slate-600">${p}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>

                ${renderWordFiles(lesson.wordFiles)}
                <div class="space-y-12 mb-16">${renderExercises(lesson.exercises)}</div>

                <div class="card mb-12">
                    <div class="p-6 border-b border-slate-100 bg-slate-50 flex items-center gap-4">
                        <div class="icon-box text-slate-500">
                            <span class="material-symbols-outlined">quiz</span>
                        </div>
                        <h3 class="font-black text-xl text-slate-500 uppercase tracking-widest text-sm">Quiz Section</h3>
                    </div>
                    <div class="p-8 space-y-10" id="quiz-section-inner">${renderQuiz(lesson.quiz)}</div>
                    <div class="p-8 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                        <div id="quiz-score-display" class="font-black text-primary text-xl hidden uppercase tracking-widest">Score: <span id="quiz-score-val">0</span> / 5</div>
                        <button onclick="submitQuiz()" id="submit-quiz-btn" class="bg-primary text-white px-10 py-4 rounded-2xl font-black text-lg shadow-xl shadow-primary/20 hover:-translate-y-1 active:scale-95 transition-all ml-auto uppercase tracking-widest">Check My Quiz</button>
                    </div>
                </div>

                <div class="flex justify-between items-center py-8 border-t border-slate-100">
                    <button onclick="goToPrevLesson()" class="font-black text-slate-300 hover:text-slate-600 transition-colors uppercase tracking-widest text-xs">Previous</button>
                    <button id="next-lesson-btn" onclick="goToNextLesson()" class="bg-primary text-white px-12 py-5 rounded-[1.5rem] font-black text-xl shadow-2xl shadow-primary/20 hover:-translate-y-1 active:scale-95 transition-all flex items-center gap-4 opacity-50 cursor-not-allowed uppercase tracking-tighter">
                        Next Lesson
                        <span class="material-symbols-outlined font-black">arrow_forward</span>
                    </button>
                </div>
            `;
            if (completedLessons.includes(id)) {
                document.getElementById('next-lesson-btn').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function renderWordFiles(wfs) {
            if (!wfs) return '';
            return wfs.map(f => `
                <div class="mb-12">
                    <h3 class="font-black text-2xl mb-6 text-slate-800 tracking-tight">${f.title}</h3>
                    <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4">
                        ${f.words.map(w => `
                            <div class="word-card group">
                                <div class="icon-box w-12 h-12 rounded-xl mb-4 group-hover:bg-primary transition-colors">
                                    <span class="material-symbols-outlined text-2xl group-hover:text-white transition-colors">${lessonsData.iconMap[w] || 'question_mark'}</span>
                                </div>
                                <span class="text-sm font-bold text-slate-600 uppercase tracking-tighter">${w}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderExercises(exs) {
            if (!exs) return '';
            return exs.map((ex, idx) => `
                <div class="card p-8">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="icon-box"><span class="material-symbols-outlined">edit_note</span></div>
                        <h3 class="font-black text-xl text-slate-800">${ex.instructions}</h3>
                    </div>
                    <div id="ex-${idx}-content">
                        ${ex.type === 'categorize' ? renderCategorize(ex, idx) :
                          ex.type === 'blanks' ? renderBlanks(ex, idx) :
                          ex.type === 'ordering' ? renderOrdering(ex, idx) :
                          ex.type === 'typing_plural' ? renderTypingPlural(ex, idx) :
                          ex.type === 'matching' ? renderMatching(ex, idx) :
                          ex.type === 'typing_pair' ? renderTypingPair(ex, idx) :
                          ex.type === 'matching_pairs' ? renderMatchingPairs(ex, idx) : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderCategorize(ex, idx) {
            return `
                <div class="flex flex-wrap gap-3 mb-10 bg-slate-50 p-6 rounded-xl border border-slate-100" id="ex-${idx}-pool">
                    ${ex.words.map(w => `<div class="draggable-item" draggable="true" ondragstart="handleDragStart(event, '${w.text}')">${w.text}</div>`).sort(() => 0.5 - Math.random()).join('')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    ${ex.columns.map(col => `
                        <div class="space-y-2">
                            <h4 class="font-black text-center text-slate-300 uppercase text-[10px] tracking-widest">${col}</h4>
                            <div class="drop-zone" data-category="${col}" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, ${idx})"></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderBlanks(ex, idx) {
            return `<div class="space-y-6">${ex.items.map((it, i) => {
                const pts = it.sentence.split('_____');
                return `<div class="text-lg font-bold text-slate-600 flex flex-wrap items-center gap-3">
                    <span class="text-slate-300 font-black text-sm">${i+1}.</span><span>${pts[0]}</span>
                    <input type="text" class="input-blank" data-answer="${it.answer}" onchange="checkBlank(this)">
                    <span>${pts[1] || ''}</span></div>`;
            }).join('')}</div>`;
        }

        function renderOrdering(ex, idx) {
            return `<div class="drop-zone min-h-[60px] mb-6 bg-teal-50/20 border-primary/20" id="ex-${idx}-zone" ondragover="handleDragOver(event)" ondrop="handleDropOrdering(event, ${idx})"></div>
                <div class="flex flex-wrap gap-2 p-4 bg-slate-50 rounded-xl border border-slate-100" id="ex-${idx}-pool">
                ${ex.words.map(w => `<div class="draggable-item" draggable="true" ondragstart="handleDragStart(event, '${w}')">${w}</div>`).sort(() => 0.5 - Math.random()).join('')}</div>`;
        }

        function renderTypingPlural(ex, idx) {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">${ex.items.map(it => `
                <div class="flex items-center gap-4 border-b border-slate-100 pb-2">
                    <span class="font-black text-primary w-28 uppercase tracking-tighter">${it.singular}</span>
                    <span class="material-symbols-outlined text-slate-200">arrow_forward</span>
                    <input type="text" class="input-blank flex-1 text-left !min-w-0" data-answer="${it.answer}" onchange="checkBlank(this)">
                </div>`).join('')}</div>`;
        }

        function renderMatching(ex, idx) {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-12"><div class="space-y-4">${ex.pairs.map(p => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="font-black text-slate-500 uppercase tracking-tighter">${p.group}</span>
                    <div class="drop-zone w-32 min-h-[44px] !p-1 bg-white shadow-inner" data-match="${p.collective}" ondragover="handleDragOver(event)" ondrop="handleDropMatching(event, ${idx})"></div>
                </div>`).join('')}</div>
                <div><p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">Word Pool</p>
                <div class="flex flex-wrap gap-2" id="ex-${idx}-pool">${ex.pairs.map(p => `<div class="draggable-item" draggable="true" ondragstart="handleDragStart(event, '${p.collective}')">${p.collective}</div>`).sort(() => 0.5 - Math.random()).join('')}</div></div></div>`;
        }

        function renderTypingPair(ex, idx) {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">${ex.items.map(it => `
                <div class="flex items-center gap-4 border-b border-slate-100 pb-2">
                    <span class="font-black text-primary w-28 uppercase tracking-tighter">${it.from}</span>
                    <span class="material-symbols-outlined text-slate-200">sync</span>
                    <input type="text" class="input-blank flex-1 text-left !min-w-0" data-answer="${it.answer}" onchange="checkBlank(this)">
                </div>`).join('')}</div>`;
        }

        function renderMatchingPairs(ex, idx) {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-12"><div class="space-y-4">${ex.pairs.map(p => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="font-black text-slate-500 uppercase tracking-tighter">${p[0]}</span>
                    <div class="drop-zone w-32 min-h-[44px] !p-1 bg-white shadow-inner" data-match="${p[1]}" ondragover="handleDragOver(event)" ondrop="handleDropMatching(event, ${idx})"></div>
                </div>`).join('')}</div>
                <div><p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">Word Pool</p>
                <div class="flex flex-wrap gap-2" id="ex-${idx}-pool">${ex.pairs.map(p => `<div class="draggable-item" draggable="true" ondragstart="handleDragStart(event, '${p[1]}')">${p[1]}</div>`).sort(() => 0.5 - Math.random()).join('')}</div></div></div>`;
        }

        function renderQuiz(quiz) {
            return quiz.map((q, i) => `
                <div class="space-y-4">
                    <p class="text-xl font-bold text-slate-600 leading-tight">${i+1}. ${q.question}</p>
                    <div class="grid grid-cols-1 gap-3">
                        ${q.type === 'multiple' ? q.options.map((opt, oi) => `
                            <button onclick="selectQuizAnswer(${i}, ${oi})" class="quiz-option" data-q="${i}" data-a="${oi}">
                                <div class="quiz-radio"><div class="quiz-radio-inner"></div></div>
                                <span>${opt}</span>
                            </button>`).join('') : q.type === 'tf' ? [true, false].map(v => `
                            <button onclick="selectQuizAnswer(${i}, ${v})" class="quiz-option" data-q="${i}" data-a="${v}">
                                <div class="quiz-radio"><div class="quiz-radio-inner"></div></div>
                                <span>${v ? 'True' : 'False'}</span>
                            </button>`).join('') : `
                            <input type="text" class="input-blank !text-left !min-w-0 w-full p-4 h-14 font-medium" placeholder="Type your answer..." data-q="${i}" onchange="quizUserAnswers[${i}] = this.value.trim()">`}
                    </div>
                </div>`).join('');
        }

        function selectQuizAnswer(qIdx, ans) {
            quizUserAnswers[qIdx] = ans;
            document.querySelectorAll(`[data-q="${qIdx}"]`).forEach(el => el.classList.remove('selected'));
            const sel = document.querySelector(`[data-q="${qIdx}"][data-a="${ans}"]`); if (sel) sel.classList.add('selected');
        }

        function submitQuiz() {
            let lesson = null;
            lessonsData.chapters.some(ch => { lesson = ch.lessons.find(l => l.id === currentLessonId); return !!lesson; });
            let score = 0;
            lesson.quiz.forEach((q, i) => {
                const u = quizUserAnswers[i];
                if (q.type === 'blank') { if (u && u.toLowerCase() === q.answer.toLowerCase()) score++; }
                else { if (u === q.answer) score++; }
            });
            document.getElementById('quiz-score-val').textContent = score;
            document.getElementById('quiz-score-display').classList.remove('hidden');

            const earnedQuizXP = score * 10;
            xp += earnedQuizXP;
            let totalCelebrated = earnedQuizXP;

            if (!completedLessons.includes(currentLessonId)) {
                completedLessons.push(currentLessonId); xp += 50;
                totalCelebrated += 50;
                showCelebration(totalCelebrated);
            }
            updateXPDisplay(); saveState(); renderSidebar();
            document.getElementById('next-lesson-btn').classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function showCelebration(earned) {
            document.getElementById('earned-xp').textContent = earned;
            document.getElementById('celebration-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('celebration-card').classList.replace('scale-0', 'scale-100'); }, 50);
        }
        function closeCelebration() { document.getElementById('celebration-modal').classList.add('hidden'); document.getElementById('celebration-card').classList.replace('scale-100', 'scale-0'); }

        function goToNextLesson() {
             let flat = []; lessonsData.chapters.forEach(ch => ch.lessons.forEach(l => flat.push(l.id)));
             const idx = flat.indexOf(currentLessonId);
             if (idx < flat.length - 1) { renderLesson(flat[idx+1]); document.getElementById('main-content').scrollTop = 0; }
        }
        function goToPrevLesson() {
             let flat = []; lessonsData.chapters.forEach(ch => ch.lessons.forEach(l => flat.push(l.id)));
             const idx = flat.indexOf(currentLessonId);
             if (idx > 0) { renderLesson(flat[idx-1]); document.getElementById('main-content').scrollTop = 0; }
        }

        function handleDragStart(e, t) { e.dataTransfer.setData('text/plain', t); e.target.classList.add('opacity-40'); }
        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function handleDrop(e, idx) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            const t = e.dataTransfer.getData('text/plain');
            const item = Array.from(document.querySelectorAll('.draggable-item')).find(el => el.innerText === t);
            if (item) { e.currentTarget.appendChild(item); item.classList.remove('opacity-40'); }
        }
        function handleDropOrdering(e, idx) {
            e.preventDefault();
            const t = e.dataTransfer.getData('text/plain');
            const item = Array.from(document.querySelectorAll('.draggable-item')).find(el => el.innerText === t);
            if (item) { e.currentTarget.appendChild(item); item.classList.remove('opacity-40'); }
        }
        function handleDropMatching(e, idx) {
            e.preventDefault(); const zone = e.currentTarget;
            if (zone.children.length > 0) document.getElementById(`ex-${idx}-pool`).appendChild(zone.children[0]);
            const t = e.dataTransfer.getData('text/plain');
            const item = Array.from(document.querySelectorAll('.draggable-item')).find(el => el.innerText === t);
            if (item) { zone.appendChild(item); item.classList.remove('opacity-40'); }
        }
        function checkBlank(inp) {
            const v = inp.value.trim().toLowerCase(); inp.classList.remove('input-correct', 'input-incorrect');
            if (v === '') return;
            inp.classList.add(v === inp.dataset.answer.toLowerCase() ? 'input-correct' : 'input-incorrect');
        }

        function updateXPDisplay() {
            document.getElementById('xp-display').textContent = `${xp} XP`;
            document.getElementById('trophy-count').querySelector('span:last-child').textContent = completedLessons.length;
            const tot = lessonsData.chapters.reduce((a, c) => a + c.lessons.length, 0);
            document.getElementById('overall-progress-bar').style.width = (completedLessons.length / tot * 100) + '%';
        }

        function renderBookPage(num) {
            if (num < 1 || num > bookData.length) return;
            currentPageNum = num; saveState();
            const p = bookData[num - 1]; const container = document.getElementById('book-page-content');
            const ratio = p.width / p.height;
            container.style.aspectRatio = ratio.toString();
            container.style.width = ratio > 1 ? '100%' : (ratio * 70) + 'vh';
            container.innerHTML = '';
            document.getElementById('page-info').innerText = `Page ${num} / ${bookData.length}`;
            const frag = document.createDocumentFragment();
            p.blocks.forEach(b => {
                if (b.type === 0) b.lines.forEach(l => l.spans.forEach(s => {
                    const el = document.createElement('span'); el.className = 'absolute whitespace-pre font-comic';
                    const x = (s.origin[0] / p.width) * 100; const y = (s.origin[1] / p.height) * 100;
                    const fz = (s.size / p.height) * 100;
                    el.style.left = `${x}%`; el.style.top = `${y - (fz * 0.8)}%`; el.style.fontSize = `${fz}cqh`;
                    let hex = (s.color >>> 0).toString(16).padStart(6, '0');
                    el.style.color = '#' + (hex.length > 6 ? hex.substring(hex.length-6) : hex);
                    if (s.flags & 2) el.style.fontStyle = 'italic'; if (s.flags & 4) el.style.fontWeight = 'bold';
                    el.textContent = s.text; frag.appendChild(el);
                }));
                else if (b.type === 1) {
                    const img = document.createElement('img'); img.src = b.src; img.className = 'absolute pointer-events-none select-none';
                    img.style.left = `${(b.bbox[0]/p.width)*100}%`; img.style.top = `${(b.bbox[1]/p.height)*100}%`;
                    img.style.width = `${((b.bbox[2]-b.bbox[0])/p.width)*100}%`; img.style.height = `${((b.bbox[3]-b.bbox[1])/p.height)*100}%`;
                    frag.appendChild(img);
                }
            });
            container.appendChild(frag);
        }
        function changePage(num) { if (num >= 1 && num <= bookData.length) renderBookPage(num); }

        init();
    </script>
</body>
</html>
