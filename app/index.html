<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar 1 - Interactive Textbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2f7f7b',
                        background: '#f6f8f7',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        comic: ['Comic Neue', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; background-color: #f6f8f7; color: #1e293b; font-size: 18px; display: flex; height: 100vh; overflow: hidden; }
        .font-black { font-weight: 900; }
        .font-bold { font-weight: 700; }
        .font-medium { font-weight: 500; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            color: #2f7f7b;
        }
        .icon-box {
            background-color: rgba(47, 127, 123, 0.1);
            border-radius: 0.5rem;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background-color: white;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            transition: box-shadow 0.2s;
            overflow: hidden;
        }
        .card:hover {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .lesson-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            color: #2f7f7b;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: rgba(47, 127, 123, 0.1);
        }
        #laser-pointer {
            position: fixed;
            width: 12px;
            height: 12px;
            background: rgba(255, 0, 0, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 10px 4px rgba(255, 0, 0, 0.4);
            display: none;
            transform: translate(-50%, -50%);
        }
        body.laser-active { cursor: crosshair; }
        body.laser-active #laser-pointer { display: block; }

        .grammar-page-container {
            container-type: size;
            background-color: white;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            border-radius: 0.5rem;
        }
        .nav-item.active {
            background-color: rgba(47, 127, 123, 0.1);
            color: #2f7f7b;
            border-right: 4px solid #2f7f7b;
            font-weight: 700;
        }
        .progress-bar-inner {
            @apply bg-primary h-full rounded-full transition-all duration-700 ease-out;
        }
        .input-blank {
            @apply border-b-2 border-dashed border-primary outline-none px-1 text-center font-bold text-primary transition-all rounded-sm;
            background-color: rgba(47, 127, 123, 0.05);
            min-width: 50px;
        }
        .input-blank:focus { @apply bg-white border-primary shadow-sm; }
        .input-correct { @apply border-green-500 bg-green-50 text-green-700 !important; }
        .input-incorrect { @apply border-red-500 bg-red-50 text-red-700 !important; }

        .drop-zone {
            @apply border-2 border-dashed border-slate-200 rounded-xl p-4 min-h-[100px] flex flex-wrap gap-2 transition-colors bg-slate-50/50;
        }
        .drop-zone.drag-over { border-color: #2f7f7b; background-color: rgba(47, 127, 123, 0.1); }
        .draggable-item {
            @apply bg-white border border-slate-200 p-2 px-4 rounded-lg shadow-sm cursor-grab active:cursor-grabbing hover:border-primary transition-all select-none font-medium text-sm;
        }

        .word-card {
            @apply flex flex-col items-center justify-center p-4 bg-white border border-slate-200 rounded-xl transition-all hover:shadow-md hover:border-primary cursor-default;
        }

        .quiz-option {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            text-align: left;
            font-weight: 500;
            color: #475569;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .quiz-option:hover {
            border-color: #2f7f7b;
            background-color: #f0fdfa;
        }
        .quiz-option.selected {
            border-color: #2f7f7b;
            background-color: rgba(47, 127, 123, 0.1);
            @apply text-primary font-bold;
        }
        .quiz-radio {
            @apply w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center flex-shrink-0 group-hover:border-primary transition-colors;
        }
        .quiz-option.selected .quiz-radio { border-color: #2f7f7b; }
        .quiz-radio-inner {
            @apply w-2.5 h-2.5 rounded-full bg-primary scale-0 transition-transform;
        }
        .quiz-option.selected .quiz-radio-inner { @apply scale-100; }

        .key-takeaways-box {
            background-color: rgba(47, 127, 123, 0.05);
            @apply rounded-2xl border border-primary/20 p-8 mb-12;
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        /* Premium Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.3s ease-out; }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        .animate-flip { animation: flip 0.6s ease-in-out; }

        /* Premium Styles */
        .premium-text { font-size: 1.125rem; line-height: 1.75rem; } /* 18px */
        .grammar-cap { color: #2f7f7b; font-weight: 700; }
        .grammar-small { color: #64748b; }
        .grammar-wrong { color: #ef4444; }
        .term-pill {
            @apply px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800 font-bold text-sm;
        }

        .premium-card {
            @apply bg-white rounded-3xl border-2 border-slate-100 p-8 shadow-xl transition-all;
        }
        .premium-card:hover { @apply border-primary/20 shadow-2xl; }

        .drop-box-premium {
            @apply border-4 border-dashed border-slate-200 rounded-3xl p-6 min-h-[200px] transition-all bg-slate-50/30;
        }
        .drop-box-premium.correct { border-color: #2f7f7b; background-color: rgba(47, 127, 123, 0.05); }

        .chip {
            @apply inline-flex items-center justify-center p-2 min-w-[40px] bg-white border-2 border-slate-200 rounded-xl cursor-pointer select-none font-black text-xl transition-all hover:border-primary;
        }
        .chip.selected { @apply border-primary bg-teal-50 text-primary; }
        .chip.correct { @apply border-primary bg-teal-50 text-primary; }
        .chip.wrong {
            border-color: #ef4444;
            background-color: #fef2f2;
            color: #dc2626;
        }

        .street-sign {
            @apply bg-white border-4 border-slate-800 p-4 rounded-sm shadow-md flex flex-col items-center gap-2;
            background-image: linear-gradient(to bottom, #fff, #f8fafc);
        }
        .street-sign.correct { @apply border-green-600 bg-green-50; }
    </style>
</head>

            "broom": "🧹", "desk": "🪑", "doll": "🪆", "egg": "🥚", "game": "🎮", "nest": "🪺", "photo": "📸", "shirt": "👕", "tooth": "🦷", "foot": "🦶", "leaf": "🍃",
            // Days
            "Monday": "📅", "Tuesday": "📅", "Wednesday": "📅", "Thursday": "📅", "Friday": "🎉", "Saturday": "⚽", "Sunday": "☀️",
            // Months
            "January": "❄️", "February": "💕", "March": "🌱", "April": "🌸", "May": "🌼", "June": "☀️", "July": "🏖️", "August": "🌻", "September": "🍂", "October": "🎃", "November": "🍁", "December": "🎄",

            "flock": "🐦", "herd": "🐄", "school": "🐟", "pack": "🐺", "bunch": "🌸", "fleet": "🚢", "team": "⚽", "choir": "🎵", "class": "📚", "pride": "🦁"
        };

        const COLLECTIVE_CONFIG = {
            "flock": { emoji: "🐦", count: 3 },
            "herd": { emoji: "🐄", count: 3 },
            "school": { emoji: "🐟", count: 4 },
            "pack": { emoji: "🐺", count: 3 },
            "bunch": { emoji: "🌸", count: 3 },
            "fleet": { emoji: "🚢", count: 3 },
            "team": { emoji: "⚽", count: 3 },
            "choir": { emoji: "🎵", count: 3 },
            "class": { emoji: "📚", count: 3 },
            "pride": { emoji: "🦁", count: 4 }
        };

        const CATEGORY_STYLES = {
            "People": "bg-blue-50",
            "People Pairs": "bg-blue-50",
            "Animals": "bg-yellow-50",
            "Animal Pairs": "bg-yellow-50",
            "Places": "bg-green-50",
            "Things": "bg-purple-50",
            "Singular/Plural Pairs": "bg-purple-50",
            "Irregular Plurals": "bg-purple-50",
            "Days": "bg-orange-50",
            "Months": "bg-orange-50",
            "Collective Nouns": "bg-orange-50",
            "Time": "bg-orange-50"
        };

        const LESSON_PAGE_MAP = {
            "1.1": 6,
            "2.1": 7,
            "3.1": 9,
            "3.2": 14,
            "3.3": 22,
            "3.4": 24,
            "3.5": 35,
            "3.6": 38
        };

        function getLessonIdFromPage(pageNum) {
            if (pageNum === 6) return "1.1";
            if (pageNum >= 7 && pageNum <= 8) return "2.1";
            if (pageNum >= 9 && pageNum <= 13) return "3.1";
            if (pageNum >= 14 && pageNum <= 21) return "3.2";
            if (pageNum >= 22 && pageNum <= 23) return "3.3";
            if (pageNum >= 24 && pageNum <= 34) return "3.4";
            if (pageNum >= 35 && pageNum <= 37) return "3.5";
            if (pageNum >= 38 && pageNum <= 44) return "3.6";
            return null;
        }

        let lessonsData = null;
        let bookData = null;
        let tocData = null;
        let currentView = 'lesson';
        let currentLessonId = '1.1';
        let currentPageNum = 1;
        let currentZoom = 100;
        let xp = 0;
        let completedLessons = [];
        let laserActive = false;
        let quizUserAnswers = {};

        async function init() {
            try {
                const [lessonsRes, bookRes, tocRes] = await Promise.all([
                    fetch('lessons.json'),
                    fetch('book_data.json'),
                    fetch('toc.json')
                ]);
                lessonsData = await lessonsRes.json();
                bookData = await bookRes.json();
                tocData = await tocRes.json();

                loadState();

                // Set initial view state for toggle button
                const btnText = document.getElementById('view-toggle-text');
                const btnIcon = document.getElementById('view-toggle-icon');
                btnIcon.classList.add('hidden');
                btnText.textContent = currentView === 'lesson' ? '📄 Book View' : '✨ Lesson View';

                renderSidebar();
                renderView();
                updateXPDisplay();

                document.getElementById('view-toggle').onclick = toggleView;
                document.getElementById('laser-toggle').onclick = toggleLaser;
                document.getElementById('prev-page').onclick = () => changePage(currentPageNum - 1);
                document.getElementById('next-page').onclick = () => changePage(currentPageNum + 1);
                document.getElementById('zoom-in').onclick = () => updateZoom(currentZoom + 10);
                document.getElementById('zoom-out').onclick = () => updateZoom(currentZoom - 10);
                document.getElementById('zoom-reset').onclick = () => updateZoom(100);
                document.getElementById('finish-lesson-btn').onclick = closeCelebration;

                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        if (e.key === '=' || e.key === '+') { e.preventDefault(); updateZoom(currentZoom + 10); }
                        if (e.key === '-') { e.preventDefault(); updateZoom(currentZoom - 10); }
                        if (e.key === '0') { e.preventDefault(); updateZoom(100); }
                    }
                });

                document.addEventListener('mousemove', (e) => {
                    if (laserActive) {
                        const lp = document.getElementById('laser-pointer');
                        lp.style.left = e.clientX + 'px';
                        lp.style.top = e.clientY + 'px';
                    }
                });
            } catch (err) { console.error("Init failed:", err); }
        }

        function loadState() {
            const saved = localStorage.getItem('grammar_v4_state');
            if (saved) {
                const state = JSON.parse(saved);
                xp = state.xp || 0;
                completedLessons = state.completedLessons || [];
                currentLessonId = state.currentLessonId || '1.1';
                currentPageNum = state.currentPageNum || 1;
                currentZoom = state.currentZoom || 100;
                updateZoom(currentZoom);
            }
        }
        function saveState() { localStorage.setItem('grammar_v4_state', JSON.stringify({ xp, completedLessons, currentLessonId, currentPageNum, currentZoom })); }

        function updateZoom(val) {
            currentZoom = Math.max(50, Math.min(200, val));
            const wrapper = document.getElementById('book-zoom-wrapper');
            if (wrapper) wrapper.style.transform = `scale(${currentZoom / 100})`;
            const levelDisp = document.getElementById('zoom-level');
            if (levelDisp) levelDisp.textContent = `${currentZoom}%`;
            saveState();

        function formatGrammarText(text) {
            if (!text) return '';
            const wrap = (str) => str.replace(/([A-Z])|([a-z])/g, (m, p1, p2) =>
                p1 ? `<span class="grammar-cap">${p1}</span>` : `<span class="grammar-small">${p2}</span>`);

            if (!text.includes('<')) return wrap(text);

            const div = document.createElement('div');
            div.innerHTML = text;
            const walk = document.createTreeWalker(div, NodeFilter.SHOW_TEXT, null, false);
            const nodes = [];
            let node;
            while (node = walk.nextNode()) nodes.push(node);

            nodes.forEach(textNode => {
                const span = document.createElement('span');
                span.innerHTML = wrap(textNode.nodeValue);
                textNode.parentNode.replaceChild(span, textNode);
            });
            return div.innerHTML;
        }

                const check = document.getElementById(`sign-check-${idx}`);

                sign.classList.add('animate-shake');
                inp.classList.add('text-red-600', 'border-red-500');

        function handlePremiumDrop(e) {
            e.preventDefault();
            const box = e.currentTarget;
            box.classList.remove('drag-over');
            const text = e.dataTransfer.getData('text/plain');
            const items = Array.from(document.querySelectorAll('#game-pool [draggable="true"]'));
            const item = items.find(el => el.innerText === text);

            if (item) {
                const targetBoxId = box.dataset.id;
                const correctBoxId = item.dataset.box;
                if (targetBoxId === correctBoxId) {
                    box.appendChild(item);
                    item.classList.add('!bg-green-50', '!border-green-500', 'animate-pop');
                    item.draggable = false;
                    box.classList.add('correct');
                } else {
                    item.classList.add('animate-shake', '!border-red-500');
                    setTimeout(() => {
                        item.classList.remove('animate-shake', '!border-red-500');
                    }, 400);
                }
            }
        }

                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        ${f.words.map(w => {
                            const isCollective = f.title === "Collective Nouns";
                            const emoji = EMOJI_MAP[w] || '❓';
                            let emojiDisplay = `<span class="text-4xl">${emoji}</span>`;

                            if (isCollective && COLLECTIVE_CONFIG[w]) {
                                const cfg = COLLECTIVE_CONFIG[w];
                                emojiDisplay = `<div class="flex flex-wrap justify-center gap-0.5 max-w-[80px]">
                                    ${Array(cfg.count).fill(0).map(() => `<span class="text-xl">${cfg.emoji}</span>`).join('')}
                                </div>`;
                            }

                            return `
                            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col items-center justify-center gap-4 transition-all hover:shadow-md hover:-translate-y-1 min-w-[100px] min-h-[120px]">
                                <div class="flex items-center justify-center min-h-[60px]">
                                    ${emojiDisplay}
                                </div>
                                <span class="text-sm font-bold text-slate-700 uppercase tracking-tight text-center">${w}</span>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function renderExercises(exs) {
            if (!exs) return '';
            return exs.map((ex, idx) => `
                <div class="card p-8">
                    ${ex.instructions ? `
                    <div class="flex items-center gap-4 mb-8">
                        <div class="icon-box"><span class="material-symbols-outlined">edit_note</span></div>
                        <h3 class="font-black text-xl text-slate-800">${ex.instructions}</h3>
                    </div>
                    ` : ''}
                    <div id="ex-${idx}-content">
                        ${ex.type === 'categorize' ? renderCategorize(ex, idx) :
                          ex.type === 'blanks' ? renderBlanks(ex, idx) :
                          ex.type === 'ordering' ? renderOrdering(ex, idx) :
                          ex.type === 'typing_plural' ? renderTypingPlural(ex, idx) :
                          ex.type === 'matching' ? renderMatching(ex, idx) :
                          ex.type === 'typing_pair' ? renderTypingPair(ex, idx) :
                          ex.type === 'matching_pairs' ? renderMatchingPairs(ex, idx) : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderCategorize(ex, idx) {
            return `
                <div class="flex flex-wrap gap-3 mb-10 bg-slate-50 p-6 rounded-xl border border-slate-100" id="ex-${idx}-pool">
                    ${ex.words.map(w => `<div class="draggable-item" draggable="true" ondragstart="handleDragStart(event, '${w.text}')">${w.text}</div>`).sort(() => 0.5 - Math.random()).join('')}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    ${ex.columns.map(col => `
                        <div class="space-y-2">
                            <h4 class="font-black text-center text-slate-300 uppercase text-[10px] tracking-widest">${col}</h4>
                            <div class="drop-zone" data-category="${col}" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, ${idx})"></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderBlanks(ex, idx) {
            return `<div class="space-y-6">${ex.items.map((it, i) => {
                const pts = it.sentence.split('_____');
                return `<div class="text-lg font-bold text-slate-600 flex flex-wrap items-center gap-3">
                    <span class="text-slate-300 font-black text-sm">${i+1}.</span><span>${pts[0]}</span>
                    <input type="text" class="input-blank" data-answer="${it.answer}" onchange="checkBlank(this)">
                    <span>${pts[1] || ''}</span></div>`;
            }).join('')}</div>`;
        }

        function renderOrdering(ex, idx) {
            return `<div class="drop-zone min-h-[60px] mb-6 bg-teal-50/20 border-primary/20" id="ex-${idx}-zone" ondragover="handleDragOver(event)" ondrop="handleDropOrdering(event, ${idx})"></div>
                <div class="flex flex-wrap gap-2 p-4 bg-slate-50 rounded-xl border border-slate-100" id="ex-${idx}-pool">
                ${ex.words.map(w => `<div class="draggable-item" draggable="true" ondragstart="handleDragStart(event, '${w}')">${w}</div>`).sort(() => 0.5 - Math.random()).join('')}</div>`;
        }

        function renderTypingPlural(ex, idx) {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">${ex.items.map(it => `
                <div class="flex items-center gap-4 border-b border-slate-100 pb-2">
                    <span class="font-black text-primary w-28 uppercase tracking-tighter">${it.singular}</span>
                    <span class="material-symbols-outlined text-slate-200">arrow_forward</span>
                    <input type="text" class="input-blank flex-1 text-left !min-w-0" data-answer="${it.answer}" onchange="checkBlank(this)">
                </div>`).join('')}</div>`;
        }

        function renderMatching(ex, idx) {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-12"><div class="space-y-4">${ex.pairs.map(p => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="font-black text-slate-500 uppercase tracking-tighter">${p.group}</span>
                    <div class="drop-zone w-32 min-h-[44px] !p-1 bg-white shadow-inner" data-match="${p.collective}" ondragover="handleDragOver(event)" ondrop="handleDropMatching(event, ${idx})"></div>
                </div>`).join('')}</div>
                <div><p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">Word Pool</p>
                <div class="flex flex-wrap gap-2" id="ex-${idx}-pool">${ex.pairs.map(p => `<div class="draggable-item" draggable="true" ondragstart="handleDragStart(event, '${p.collective}')">${p.collective}</div>`).sort(() => 0.5 - Math.random()).join('')}</div></div></div>`;
        }

        function renderTypingPair(ex, idx) {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">${ex.items.map(it => `
                <div class="flex items-center gap-4 border-b border-slate-100 pb-2">
                    <span class="font-black text-primary w-28 uppercase tracking-tighter">${it.from}</span>
                    <span class="material-symbols-outlined text-slate-200">sync</span>
                    <input type="text" class="input-blank flex-1 text-left !min-w-0" data-answer="${it.answer}" onchange="checkBlank(this)">
                </div>`).join('')}</div>`;
        }

        function renderMatchingPairs(ex, idx) {
            return `<div class="grid grid-cols-1 md:grid-cols-2 gap-12"><div class="space-y-4">${ex.pairs.map(p => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <span class="font-black text-slate-500 uppercase tracking-tighter">${p[0]}</span>
                    <div class="drop-zone w-32 min-h-[44px] !p-1 bg-white shadow-inner" data-match="${p[1]}" ondragover="handleDragOver(event)" ondrop="handleDropMatching(event, ${idx})"></div>
                </div>`).join('')}</div>
                <div><p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">Word Pool</p>
                <div class="flex flex-wrap gap-2" id="ex-${idx}-pool">${ex.pairs.map(p => `<div class="draggable-item" draggable="true" ondragstart="handleDragStart(event, '${p[1]}')">${p[1]}</div>`).sort(() => 0.5 - Math.random()).join('')}</div></div></div>`;
        }

        function renderQuiz(quiz) {
            return quiz.map((q, i) => `
                <div class="space-y-4">
                    <p class="text-xl font-bold text-slate-600 leading-tight">${i+1}. ${q.question}</p>
                    <div class="grid grid-cols-1 gap-3">
                        ${q.type === 'multiple' ? q.options.map((opt, oi) => `
                            <button onclick="selectQuizAnswer(${i}, ${oi})" class="quiz-option" data-q="${i}" data-a="${oi}">
                                <div class="quiz-radio"><div class="quiz-radio-inner"></div></div>
                                <span>${opt}</span>
                            </button>`).join('') : q.type === 'tf' ? [true, false].map(v => `
                            <button onclick="selectQuizAnswer(${i}, ${v})" class="quiz-option" data-q="${i}" data-a="${v}">
                                <div class="quiz-radio"><div class="quiz-radio-inner"></div></div>
                                <span>${v ? 'True' : 'False'}</span>
                            </button>`).join('') : q.type === 'multiple_select' ? q.options.map((opt, oi) => `
                            <button onclick="toggleQuizMultiAnswer(${i}, ${oi})" class="quiz-option" data-q="${i}" data-a="${oi}">
                                <div class="w-5 h-5 rounded border-2 border-slate-300 flex items-center justify-center flex-shrink-0 group-hover:border-primary transition-colors">
                                    <span class="material-symbols-outlined text-sm scale-0 transition-transform">check</span>
                                </div>
                                <span>${opt}</span>
                            </button>`).join('') : `
                            <input type="text" class="input-blank !text-left !min-w-0 w-full p-4 h-14 font-medium" placeholder="Type your answer..." data-q="${i}" onchange="quizUserAnswers[${i}] = this.value.trim()">`}
                    </div>
                </div>`).join('');
        }

        function selectQuizAnswer(qIdx, ans) {
            quizUserAnswers[qIdx] = ans;
            document.querySelectorAll(`[data-q="${qIdx}"]`).forEach(el => el.classList.remove('selected'));
            const sel = document.querySelector(`[data-q="${qIdx}"][data-a="${ans}"]`); if (sel) sel.classList.add('selected');
        }

        function toggleQuizMultiAnswer(qIdx, ans) {
            if (!quizUserAnswers[qIdx]) quizUserAnswers[qIdx] = [];
            const idx = quizUserAnswers[qIdx].indexOf(ans);
            if (idx > -1) quizUserAnswers[qIdx].splice(idx, 1);
            else quizUserAnswers[qIdx].push(ans);

            document.querySelectorAll(`[data-q="${qIdx}"][data-a="${ans}"]`).forEach(el => {
                el.classList.toggle('selected');
                el.querySelector('.material-symbols-outlined').classList.toggle('scale-0');
            });
        }

        function submitQuiz() {
            let lesson = null;
            lessonsData.chapters.some(ch => { lesson = ch.lessons.find(l => l.id === currentLessonId); return !!lesson; });
            let score = 0;
            lesson.quiz.forEach((q, i) => {
                const u = quizUserAnswers[i];
                if (q.type === 'blank') { if (u && u.toLowerCase() === q.answer.toLowerCase()) score++; }
                else if (q.type === 'multiple_select') {
                    if (Array.isArray(u) && u.length === q.answer.length && u.every(v => q.answer.includes(v))) score++;
                }
                else { if (u === q.answer) score++; }
            });
            document.getElementById('quiz-score-val').textContent = score;
            document.getElementById('quiz-score-display').classList.remove('hidden');

            const earnedQuizXP = score * 10;
            xp += earnedQuizXP;
            let totalCelebrated = earnedQuizXP;

            if (score >= 4) {
                 confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#2f7f7b', '#fcd34d', '#3b82f6']
                });
            }

            if (!completedLessons.includes(currentLessonId)) {
                completedLessons.push(currentLessonId); xp += 50;
                totalCelebrated += 50;
                showCelebration(totalCelebrated);
            }
            updateXPDisplay(); saveState(); renderSidebar();

            const nextBtn = document.getElementById('next-lesson-btn');
            if (nextBtn) nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function showCelebration(earned) {
            document.getElementById('earned-xp').textContent = earned;
            document.getElementById('celebration-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('celebration-card').classList.replace('scale-0', 'scale-100'); }, 50);
        }
        function closeCelebration() { document.getElementById('celebration-modal').classList.add('hidden'); document.getElementById('celebration-card').classList.replace('scale-100', 'scale-0'); }

        function goToNextLesson() {
             let flat = []; lessonsData.chapters.forEach(ch => ch.lessons.forEach(l => flat.push(l.id)));
             const idx = flat.indexOf(currentLessonId);
             if (idx < flat.length - 1) { renderLesson(flat[idx+1]); document.getElementById('main-content').scrollTop = 0; }
        }
        function goToPrevLesson() {
             let flat = []; lessonsData.chapters.forEach(ch => ch.lessons.forEach(l => flat.push(l.id)));
             const idx = flat.indexOf(currentLessonId);
             if (idx > 0) { renderLesson(flat[idx-1]); document.getElementById('main-content').scrollTop = 0; }
        }

        function handleDragStart(e, t) { e.dataTransfer.setData('text/plain', t); e.target.classList.add('opacity-40'); }
        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function handleDrop(e, idx) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            const t = e.dataTransfer.getData('text/plain');
            const item = Array.from(document.querySelectorAll('.draggable-item')).find(el => el.innerText === t);
            if (item) { e.currentTarget.appendChild(item); item.classList.remove('opacity-40'); }
        }
        function handleDropOrdering(e, idx) {
            e.preventDefault();
            const t = e.dataTransfer.getData('text/plain');
            const item = Array.from(document.querySelectorAll('.draggable-item')).find(el => el.innerText === t);
            if (item) { e.currentTarget.appendChild(item); item.classList.remove('opacity-40'); }
        }
        function handleDropMatching(e, idx) {
            e.preventDefault(); const zone = e.currentTarget;
            if (zone.children.length > 0) document.getElementById(`ex-${idx}-pool`).appendChild(zone.children[0]);
            const t = e.dataTransfer.getData('text/plain');
            const item = Array.from(document.querySelectorAll('.draggable-item')).find(el => el.innerText === t);
            if (item) { zone.appendChild(item); item.classList.remove('opacity-40'); }
        }
        function checkBlank(inp) {
            const v = inp.value.trim().toLowerCase(); inp.classList.remove('input-correct', 'input-incorrect');
            if (v === '') return;
            inp.classList.add(v === inp.dataset.answer.toLowerCase() ? 'input-correct' : 'input-incorrect');
        }

        function updateXPDisplay() {
            document.getElementById('xp-display').textContent = `${xp} XP`;
            document.getElementById('trophy-count').querySelector('span:last-child').textContent = completedLessons.length;
            const tot = lessonsData.chapters.reduce((a, c) => a + c.lessons.length, 0);
            document.getElementById('overall-progress-bar').style.width = (completedLessons.length / tot * 100) + '%';
        }

        function renderBookPage(num) {
            if (num < 1 || num > bookData.length) return;
            currentPageNum = num; saveState();
            const p = bookData[num - 1]; const container = document.getElementById('book-page-content');
            const ratio = p.width / p.height;
            container.style.aspectRatio = ratio.toString();
            container.style.width = ratio > 1 ? '100%' : (ratio * 70) + 'vh';
            container.innerHTML = '';
            document.getElementById('page-info').innerText = `Page ${num} / ${bookData.length}`;
            const frag = document.createDocumentFragment();
            p.blocks.forEach(b => {
                if (b.type === 0) b.lines.forEach(l => l.spans.forEach(s => {
                    const el = document.createElement('span'); el.className = 'absolute whitespace-pre font-comic';
                    const x = (s.origin[0] / p.width) * 100; const y = (s.origin[1] / p.height) * 100;
                    const fz = (s.size / p.height) * 100;
                    el.style.left = `${x}%`; el.style.top = `${y - (fz * 0.8)}%`; el.style.fontSize = `${fz}cqh`;
                    let hex = (s.color >>> 0).toString(16).padStart(6, '0');
                    el.style.color = '#' + (hex.length > 6 ? hex.substring(hex.length-6) : hex);
                    if (s.flags & 2) el.style.fontStyle = 'italic'; if (s.flags & 4) el.style.fontWeight = 'bold';
                    el.textContent = s.text; frag.appendChild(el);
                }));
                else if (b.type === 1) {
                    const img = document.createElement('img'); img.src = b.src; img.className = 'absolute pointer-events-none select-none';
                    img.style.left = `${(b.bbox[0]/p.width)*100}%`; img.style.top = `${(b.bbox[1]/p.height)*100}%`;
                    img.style.width = `${((b.bbox[2]-b.bbox[0])/p.width)*100}%`; img.style.height = `${((b.bbox[3]-b.bbox[1])/p.height)*100}%`;
                    frag.appendChild(img);
                }
            });
            container.appendChild(frag);
        }
        function changePage(num) { if (num >= 1 && num <= bookData.length) renderBookPage(num); }

        init();
    </script>
</body>
</html>
